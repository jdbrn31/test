<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Information</title>
  <link rel="stylesheet" href="/styles/customer-information.css" />
</head>
<body>

  <div class="container">
    <h1>Customer Information</h1>
    <p class="subtitle">Please fill in all required fields.</p>

    <form id="cus_info_form" action="api/customer-info" method="post">

      <div class="form-group">
        <label for="fullname">Full Name <span class="required">*</span></label>
        <input type="text" id="cus_fullname" name="fullname" placeholder="e.g. Juan dela Cruz" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="cus_email" name="email" placeholder="e.g. juan@email.com" required />
      </div>

      <div class="form-group">
        <label for="age">Age <span class="required">*</span></label>
        <input type="number" id="cus_age" name="age" placeholder="e.g. 25" min="1" max="120" required />
      </div>

      <div class="form-group">
        <label for="address">Address <span class="required">*</span></label>
        <textarea id="cus_address" name="address" rows="3" placeholder="e.g. 123 Rizal St., Quezon City" required></textarea>
      </div>

      <div class="form-group">
        <label for="contact">Contact Number <span class="required">*</span></label>
        <input type="tel" id="cus_contact" name="contact" placeholder="e.g. 09XX-XXX-XXXX" required />
      </div>

      <!--<div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="agreement" name="agreement" required />
          <span class="checkmark"></span>
          <span class="checkbox-text">
            I confirm that all the information I have provided is accurate and true.
            I understand that my personal data will be kept secure and will not be
            shared with any third party without my consent.
          </span>
        </label>
      </div>-->

      <button type="submit">Submit</button>

    </form>
  </div>
  <script src="/js/customer-info.js"></script>
</body>
</html>
